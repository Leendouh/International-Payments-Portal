# SonarQube Configuration for International Payments Portal

sonar.projectKey=International-Payments-Portal_Leendouh
sonar.organization=leendouh

# Source code location
sonar.sources=backend,frontend/src
sonar.tests=backend/tests,frontend/src
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/*.config.js,**/*.config.mjs

# JavaScript/TypeScript analysis
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info,frontend/coverage/lcov.info
sonar.javascript.coverage.reportPaths=backend/coverage/coverage-final.json,frontend/coverage/coverage-final.json

# Code quality thresholds
sonar.qualitygate.wait=true

# Security hotspots
sonar.security.hotspots.enabled=true

# Code smells
sonar.codeSmells.enabled=true

# Bugs
sonar.bugs.enabled=true

# Vulnerabilities
sonar.vulnerabilities.enabled=true

# Duplications
sonar.cpd.javascript.minimumTokens=50

# Encoding
sonar.sourceEncoding=UTF-8
